<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Joan | My Student Portfolio</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=EB+Garamond&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  height: 100vh;
  overflow: hidden;
  background: linear-gradient(120deg, #f3ead7, #e8dcc7, #f6efe3);
  color: #3b2f2a;
  font-family: 'EB Garamond', serif;
  position: relative;
}

/* parchment glow */
body::before {
  content: "";
  position: fixed;
  width: 100%;
  height: 100%;
  background: radial-gradient(circle at top, rgba(120, 90, 60, 0.15), transparent 60%);
  z-index: 0;
}

/* main content */
.container {
  position: relative;
  z-index: 2;
  text-align: center;
  top: 50%;
  transform: translateY(-50%);
  padding: 20px;
}

h1 {
  font-family: 'Playfair Display', serif;
  font-size: 48px;
  color: #4a3a2a;
  letter-spacing: 1px;
}

p {
  font-size: 18px;
  margin-top: 10px;
  color: #5a4637;
  opacity: 0.9;
}

.btn {
  display: inline-block;
  margin-top: 25px;
  padding: 12px 30px;
  background: #8c6f4f;
  color: #fff;
  text-decoration: none;
  border-radius: 4px;
  letter-spacing: 1px;
  transition: 0.3s;
}

.btn:hover {
  background: #6f553d;
  transform: scale(1.05);
}

/* 🍂 leaves */
.leaf {
  position: fixed;
  top: -50px;
  width: 16px;
  height: 16px;
  background: #7a5c3b;
  opacity: 0.6;
  border-radius: 60% 0 60% 60%;
  z-index: 1;
  animation: fall linear infinite;
}

.leaf::before {
  content: "";
  position: absolute;
  width: 100%;
  height: 100%;
  background: #6b4e33;
  border-radius: 60% 0 60% 60%;
  transform: rotate(25deg);
  opacity: 0.7;
}

@keyframes fall {
  0% {
    transform: translateY(-10vh) translateX(0) rotate(0deg);
    opacity: 0;
  }
  10% {
    opacity: 0.9;
  }
  100% {
    transform: translateY(110vh) translateX(100px) rotate(360deg);
    opacity: 0;
  }
}
</style>
</head>

<body>

<script>
for (let i = 0; i < 20; i++) {
  let leaf = document.createElement("div");
  leaf.className = "leaf";

  leaf.style.left = Math.random() * 100 + "vw";
  leaf.style.animationDuration = (Math.random() * 7 + 6) + "s";
  leaf.style.animationDelay = Math.random() * 5 + "s";
  leaf.style.opacity = Math.random();

  document.body.appendChild(leaf);
}
</script>

<div class="container">
  <h1>Hi, I'm Joan</h1>
  <p>BSIT-SOUTH7 | Future Web Developer</p>

  <!-- ✅ FIXED PDF BUTTON -->
  <a href="./portfolio.pdf" target="_blank" class="btn">
    VIEW MY PORTFOLIO (PDF)
  </a>
</div>

</body>
</html>
